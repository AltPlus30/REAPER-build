name: Build

on:
  workflow_dispatch:
    inputs:
      release_artifacts:
        description: "Release build?"
        required: true
        default: "no"

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Vulkan SDK
      uses: lunarg/setup-vulkan-sdk@v1
      with:
        vulkan-query-version: 1.3.268.0
        install-runtime: true

    - name: Compile Shaders
      working-directory: vulkan_shaders
      run: python compile_all.py

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release --parallel
